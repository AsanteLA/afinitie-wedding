<html lang="en">
<head>

  <meta property="og:url"         content="https://afinitie.com" />
  <meta name="twitter:card"       content="summary_large_image" />

  <link rel="stylesheet" href="styles/main.css" />
  <style>
    .rsvp-wrap {
      max-width: 580px;
      margin: 0 auto;
    }

    .radio-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .radio-option {
      flex: 1;
      min-width: 120px;
    }

    .radio-option input[type="radio"] { display: none; }

    .radio-option label {
      display: block;
      padding: 0.85rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      text-align: center;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all var(--transition);
      color: var(--color-muted);
    }

    .radio-option input[type="radio"]:checked + label {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    .form-success {
      display: none;
      text-align: center;
      padding: var(--space-lg) var(--space-md);
    }

    .form-success h3 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .form-success p { color: var(--color-muted); }

    /* ── Event checkboxes (full / luncheon tiers) ── */
    .event-check-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .check-option { position: relative; }
    .check-option input[type="checkbox"] { display: none; }

    .check-option__label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem 1rem 1.25rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
    }

    .check-option__label:hover {
      border-color: var(--color-accent);
      background: var(--color-accent-lt);
    }

    .check-option input[type="checkbox"]:checked + .check-option__label {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }


    .check-option__text {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .check-option__time {
      font-size: 0.72rem;
      opacity: 0.75;
      letter-spacing: 0.05em;
      font-weight: 300;
      text-transform: none;
    }

    .check-option--decline { margin-top: 0.5rem; }

    .check-option--decline .check-option__label {
      border-style: dashed;
      color: var(--color-muted);
    }

    .check-option--decline input[type="checkbox"]:checked + .check-option__label {
      background: #888;
      border-color: #888;
      color: #fff;
      border-style: solid;
    }

    /* Song autocomplete */
    .song-autocomplete { position: relative; }

    .song-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      z-index: 50;
      list-style: none;
      margin: 0;
      padding: 0.25rem 0;
      max-height: 280px;
      overflow-y: auto;
    }

    .song-dropdown.open { display: block; }

    .song-dropdown li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background var(--transition);
    }

    .song-dropdown li:hover,
    .song-dropdown li.active {
      background: var(--color-accent-lt);
    }

    .song-dropdown__art {
      width: 40px;
      height: 40px;
      border-radius: 3px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--color-accent-lt);
    }

    .song-dropdown__info { min-width: 0; }

    .song-dropdown__title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-dropdown__artist {
      font-size: 0.78rem;
      color: var(--color-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-dropdown__loading,
    .song-dropdown__empty {
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      color: var(--color-muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ==================== NAV ==================== -->
  <nav class="nav" id="nav">
    <a href="index.html" class="nav__logo"><img src="images/logo.png" alt="Afinitie" class="nav__logo-img" /></a>
    <button class="nav__hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="our-story.html">Our Story</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="schedule.html">Schedule</a></li>
      <li><a href="rsvp.html" class="active">RSVP</a></li>
      <li><a href="registry.html">Registry</a></li>
      <li><a href="guestbook.html">Guestbook</a></li>
      <li><a href="playlist.html" aria-label="Playlist" title="Playlist" style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:rgba(212,152,26,0.12);border:1px solid rgba(212,152,26,0.35);color:var(--color-gold);transition:background 0.2s,border-color 0.2s;" onmouseover="this.style.background='rgba(212,152,26,0.22)'" onmouseout="this.style.background='rgba(212,152,26,0.12)'"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></a></li>
    </ul>
  </nav>

  <!-- ==================== PAGE HERO ==================== -->
  <div class="page-hero">
    <span class="eyebrow">You're Invited</span>
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem);">RSVP</h1>
    <div class="divider"></div>
    <p style="color:var(--color-muted); margin-top:1rem; max-width:460px; margin-left:auto; margin-right:auto;">
      Please respond by <!-- RSVP DEADLINE PLACEHOLDER -->. We can't wait to celebrate with you.
    </p>
  </div>

  <!-- ==================== FORM ==================== -->
  <section class="section section--alt">
    <div class="container">
      <div class="rsvp-wrap">

        <!-- Success state (shown after submit) -->
        <div class="form-success" id="formSuccess">
          <div style="display:flex; justify-content:center; margin-bottom:1rem;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-accent);" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </div>
          <h3>Thank you!</h3>
          <p>We've received your RSVP and can't wait to see you.</p>
          <a href="index.html" class="btn btn--outline" style="margin-top:1.5rem;">Back to Home</a>
        </div>

        <!-- Form -->
        <form id="rsvpForm" novalidate>

          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your full name" required />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group" id="attendingGroup">
            <label id="attendingLabel">Will you be attending?</label>
            <div id="attendingOptions">
              <!-- Populated by rsvp.js based on guest tier -->
            </div>
          </div>

          <div class="form-group" id="guestCountGroup" style="display:none;">
            <label for="guests">Number of Guests (including yourself)</label>
            <select id="guests" name="guests">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>

          <div class="form-group" id="dietaryGroup" style="display:none;">
            <label for="dietary">Dietary Requirements</label>
            <input type="text" id="dietary" name="dietary" placeholder="Vegetarian, vegan, allergies…" />
          </div>

          <div class="form-group" id="songGroup" style="display:none;">
            <label for="song">Song Request <span style="font-style:italic; text-transform:none; letter-spacing:0;">(optional)</span></label>
            <div class="song-autocomplete" id="songAutocomplete">
              <input type="text" id="song" name="song" placeholder="Start typing a song or artist…" autocomplete="off" />
              <ul class="song-dropdown" id="songDropdown" role="listbox" aria-label="Song suggestions"></ul>
            </div>
          </div>

          <div class="form-group">
            <label for="message">Message for the Couple <span style="font-style:italic; text-transform:none; letter-spacing:0;">(optional)</span></label>
            <textarea id="message" name="message" placeholder="Share a kind word…"></textarea>
          </div>

          <button type="submit" class="btn btn--primary" style="width:100%;">Send RSVP</button>

        </form>
      </div>
    </div>
  </section>

  <!-- ==================== FOOTER ==================== -->
  <footer class="footer">
    <div class="footer__names"><img src="images/logo.png" alt="Afinitie" class="footer__logo-img" /></div>
    <p>September 15, 2026 · Lindon, Utah</p>
    <p style="margin-top:0.5rem;">Made with love <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-1px; color:var(--color-highlight);" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></p>
  </footer>

  <script src="js/gate.js"></script>
  <script src="js/main.js"></script>
  <script src="js/song-search.js"></script>
  <script src="js/rsvp.js"></script>
</body>
</html>
