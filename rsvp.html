<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP — Afinitie</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/logo.png" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Asante &amp; Abbie — September 23, 2026" />
  <meta property="og:description" content="Join us as we celebrate our wedding day. We are so glad you are here." />
  <meta property="og:image"       content="images/logo.png" />
  <meta property="og:url"         content="https://d30qctp40jwjfl.cloudfront.net" />
  <meta name="twitter:card"       content="summary_large_image" />

  <link rel="stylesheet" href="styles/main.css" />
  <style>
    .rsvp-wrap {
      max-width: 580px;
      margin: 0 auto;
    }

    .radio-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .radio-option {
      flex: 1;
      min-width: 120px;
    }

    .radio-option input[type="radio"] { display: none; }

    .radio-option label {
      display: block;
      padding: 0.85rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      text-align: center;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all var(--transition);
      color: var(--color-muted);
    }

    .radio-option input[type="radio"]:checked + label {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    .form-success {
      display: none;
      text-align: center;
      padding: var(--space-lg) var(--space-md);
    }

    .form-success h3 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .form-success p { color: var(--color-muted); }

    /* Song autocomplete */
    .song-autocomplete { position: relative; }

    .song-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      z-index: 50;
      list-style: none;
      margin: 0;
      padding: 0.25rem 0;
      max-height: 280px;
      overflow-y: auto;
    }

    .song-dropdown.open { display: block; }

    .song-dropdown li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background var(--transition);
    }

    .song-dropdown li:hover,
    .song-dropdown li.active {
      background: var(--color-accent-lt);
    }

    .song-dropdown__art {
      width: 40px;
      height: 40px;
      border-radius: 3px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--color-accent-lt);
    }

    .song-dropdown__info { min-width: 0; }

    .song-dropdown__title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-dropdown__artist {
      font-size: 0.78rem;
      color: var(--color-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-dropdown__loading,
    .song-dropdown__empty {
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      color: var(--color-muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ==================== NAV ==================== -->
  <nav class="nav" id="nav">
    <a href="index.html" class="nav__logo"><img src="images/logo.png" alt="Afinitie" class="nav__logo-img" /></a>
    <button class="nav__hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="our-story.html">Our Story</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="schedule.html">Schedule</a></li>
      <li><a href="rsvp.html" class="active">RSVP</a></li>
      <li><a href="registry.html">Registry</a></li>
      <li><a href="guestbook.html">Guestbook</a></li>
      <li><a href="playlist.html">Playlist</a></li>
    </ul>
  </nav>

  <!-- ==================== PAGE HERO ==================== -->
  <div class="page-hero">
    <span class="eyebrow">You're Invited</span>
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem);">RSVP</h1>
    <div class="divider"></div>
    <p style="color:var(--color-muted); margin-top:1rem; max-width:460px; margin-left:auto; margin-right:auto;">
      Please respond by <!-- RSVP DEADLINE PLACEHOLDER -->. We can't wait to celebrate with you.
    </p>
  </div>

  <!-- ==================== FORM ==================== -->
  <section class="section section--alt">
    <div class="container">
      <div class="rsvp-wrap">

        <!-- Success state (shown after submit) -->
        <div class="form-success" id="formSuccess">
          <div style="font-size:3rem; margin-bottom:1rem;">🤍</div>
          <h3>Thank you!</h3>
          <p>We've received your RSVP and can't wait to see you.</p>
          <a href="index.html" class="btn btn--outline" style="margin-top:1.5rem;">Back to Home</a>
        </div>

        <!-- Form -->
        <form id="rsvpForm" novalidate>

          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your full name" required />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label>Will you be attending?</label>
            <div class="radio-group">
              <div class="radio-option">
                <input type="radio" id="attending-yes" name="attending" value="yes" required />
                <label for="attending-yes">Joyfully accepts</label>
              </div>
              <div class="radio-option">
                <input type="radio" id="attending-no" name="attending" value="no" />
                <label for="attending-no">Regretfully declines</label>
              </div>
            </div>
          </div>

          <div class="form-group" id="guestCountGroup" style="display:none;">
            <label for="guests">Number of Guests (including yourself)</label>
            <select id="guests" name="guests">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>

          <div class="form-group" id="dietaryGroup" style="display:none;">
            <label for="dietary">Dietary Requirements</label>
            <input type="text" id="dietary" name="dietary" placeholder="Vegetarian, vegan, allergies…" />
          </div>

          <div class="form-group" id="songGroup" style="display:none;">
            <label for="song">Song Request <span style="font-style:italic; text-transform:none; letter-spacing:0;">(optional)</span></label>
            <div class="song-autocomplete" id="songAutocomplete">
              <input type="text" id="song" name="song" placeholder="Start typing a song or artist…" autocomplete="off" />
              <ul class="song-dropdown" id="songDropdown" role="listbox" aria-label="Song suggestions"></ul>
            </div>
          </div>

          <div class="form-group">
            <label for="message">Message for the Couple <span style="font-style:italic; text-transform:none; letter-spacing:0;">(optional)</span></label>
            <textarea id="message" name="message" placeholder="Share a kind word…"></textarea>
          </div>

          <button type="submit" class="btn btn--primary" style="width:100%;">Send RSVP</button>

        </form>
      </div>
    </div>
  </section>

  <!-- ==================== FOOTER ==================== -->
  <footer class="footer">
    <div class="footer__names"><img src="images/logo.png" alt="Afinitie" class="footer__logo-img" /></div>
    <p><!-- DATE & LOCATION PLACEHOLDER --></p>
    <p style="margin-top:0.5rem;">Made with love ♡</p>
  </footer>

  <script src="js/gate.js"></script>
  <script src="js/main.js"></script>
  <script src="js/song-search.js"></script>
  <script src="js/rsvp.js"></script>
</body>
</html>
